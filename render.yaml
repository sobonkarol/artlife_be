services:
  - type: web
    name: artlife-be
    runtime: java
    buildCommand: ./gradlew build -x test
    startCommand: java -jar build/libs/artlife_be-0.0.1-SNAPSHOT.jar
    envVars:
      - key: CORS_ALLOWED_ORIGINS
        sync: false  # Set this manually in Render dashboard to your frontend URL
